name: Check Broadcom TechDocs Update

on:
  schedule:
    # 한국 시간(KST) 기준: 09:00, 12:00, 15:00 (3시간 간격)
    # UTC 기준: 00:00, 03:00, 06:00
    - cron: '0 0,3,6 * * *'
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run check script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JANDI_WEBHOOK_URL: ${{ secrets.JANDI_WEBHOOK_URL }}
        run: python check_update.py

      - name: Commit and push updated state
        if: env.UPDATE_FOUND == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add state.json
          git commit -m "Update state.json with new dates"
          git push
